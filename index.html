<html lang="zh-CN">
<head>

    <title>CS:GO 皮肤磨损计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            font-weight: 700;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 0;
        }

        .main-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2d3748;
            margin: 0 0 16px 0;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #4299e1;
            position: relative;
        }

        /* 搜索框 */
        .search-container {
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-size: 16px;
            background: white;
            transition: all 0.3s ease;
            line-height: 1.5;
            height: 44px;
            box-sizing: border-box;
        }

        .search-input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.2);
        }

        /* 武器箱列表 */
        .case-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }

        .case-item {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-weight: 500;
            font-size: 14px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .case-item:active {
            background: #f7fafc;
            border-color: #4299e1;
            transform: scale(0.98);
        }

        .case-item.active {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        .case-item.pinned {
            background: #fffaf0;
            border-color: #ed8936;
            color: #744210;
        }

        /* 置顶按钮样式 */
        .pin-btn {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
            opacity: 0.7;
        }

        .pin-btn:hover {
            background: rgba(66, 153, 225, 0.1);
            opacity: 1;
            transform: scale(1.1);
        }

        .pin-btn:active {
            transform: scale(0.95);
        }

        .case-item:hover .pin-btn {
            opacity: 1;
        }

        .pin-indicator {
            color: #ed8936;
            font-size: 0.9em;
            margin-right: 4px;
        }

        /* 皮肤级别 */
        .level-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .level-item {
            padding: 8px 12px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 13px;
            min-height: 36px;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .level-item:active {
            background: #f7fafc;
            transform: scale(0.95);
        }

        .level-item.active {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        /* 皮肤列表 */
        .skin-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }

        .skin-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .skin-card:active {
            transform: scale(0.95);
            background: #f7fafc;
        }

        .skin-card.active {
            border-color: #4299e1;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.2);
        }

        .skin-image {
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
        }

        .skin-name {
            padding: 8px;
            text-align: center;
            font-weight: 500;
            font-size: 12px;
            line-height: 1.3;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 磨损值输入 */
        .wear-section {
            background: white;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .wear-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            height: 44px;
            box-sizing: border-box;
        }

        .wear-input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.2);
        }

        .wear-input.error {
            border-color: #f56565;
            background: #fed7d7;
        }

        .wear-range {
            text-align: center;
            color: #718096;
            font-size: 13px;
            line-height: 1.4;
        }

        .wear-range.error {
            color: #f56565;
        }

        /* 按钮 */
        .calculate-btn {
            width: 100%;
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 16px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .calculate-btn:active {
            transform: scale(0.98);
            background: linear-gradient(135deg, #38a169, #2f855a);
        }

        /* 结果区域 */
        .results-section {
            background: white;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #e2e8f0;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .result-card {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            border-left: 3px solid #4299e1;
        }

        .result-skin-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #2d3748;
            line-height: 1.3;
        }

        .result-wear {
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .result-condition {
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .condition-factory-new {
            background: #c6f6d5;
            color: #22543d;
        }

        .condition-minimal-wear {
            background: #fed7d7;
            color: #742a2a;
        }

        .condition-field-tested {
            background: #fefcbf;
            color: #744210;
        }

        .condition-well-worn {
            background: #fed7aa;
            color: #7c2d12;
        }

        .condition-battle-scarred {
            background: #e2e8f0;
            color: #2d3748;
        }

        /* 响应式设计 - 桌面端优化 */
        @media (min-width: 768px) {
            .container {
                max-width: 768px;
                margin: 20px auto;
                border-radius: 16px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            }
            
            .header {
                border-radius: 16px 16px 0 0;
            }
            
            .main-content {
                padding: 24px;
                gap: 20px;
            }
            
            .section {
                padding: 20px;
                border-radius: 12px;
            }
            
            .skin-list {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            
            .case-list {
                max-height: 250px;
            }
        }

        /* 大屏手机优化 */
        @media (min-width: 414px) and (max-width: 767px) {
            .skin-list {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .no-data {
            text-align: center;
            color: #a0aec0;
            padding: 40px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #718096;
        }
    </style>
</head>

        // 应用状态
        const state = {
            cases: casesData,
            filteredCases: casesData,
            selectedCase: null,
            selectedLevel: null,
            selectedSkin: null,
            wearValue: 0.35,
            pinnedCases: JSON.parse(localStorage.getItem('pinnedCases') || '[]'),
            searchQuery: ''
        };

        // 皮肤级别顺序
        const levelOrder = {
            '消费级': 1,
            '工业级': 2,
            '军规级': 3,
            '受限': 4,
            '保密': 5,
            '隐秘': 6
        };

        // DOM 元素
        const elements = {
            searchInput: document.getElementById('searchInput'),
            caseList: document.getElementById('caseList'),
            levelList: document.getElementById('levelList'),
            skinList: document.getElementById('skinList'),
            wearInput: document.getElementById('wearInput'),
            wearRange: document.getElementById('wearRange'),
            calculateBtn: document.getElementById('calculateBtn'),
            resultsContainer: document.getElementById('resultsContainer')
        };

        // 初始化应用
        function init() {
            renderCaseList();
            setupEventListeners();
            
            // 默认选择第一个武器箱
            if (state.cases.length > 0) {
                selectCase(state.cases[0]);
            }
        }

        // 设置事件监听器
        function setupEventListeners() {
            elements.searchInput.addEventListener('input', handleSearch);
            elements.wearInput.addEventListener('input', handleWearInput);
            elements.calculateBtn.addEventListener('click', calculateResults);
            
            // 长按武器箱置顶
            let longPressTimer;
            elements.caseList.addEventListener('touchstart', (e) => {
                const caseItem = e.target.closest('.case-item');
                if (caseItem) {
                    longPressTimer = setTimeout(() => {
                        const caseId = parseInt(caseItem.dataset.id);
                        togglePinCase(caseId);
                        caseItem.style.transform = 'scale(1)';
                    }, 500);
                    caseItem.style.transform = 'scale(0.95)';
                }
            });
            
            elements.caseList.addEventListener('touchend', (e) => {
                clearTimeout(longPressTimer);
                const caseItem = e.target.closest('.case-item');
                if (caseItem) {
                    caseItem.style.transform = 'scale(1)';
                }
            });
            
            elements.caseList.addEventListener('touchmove', () => {
                clearTimeout(longPressTimer);
            });
            
            // 桌面端双击置顶（兼容性）
            elements.caseList.addEventListener('dblclick', (e) => {
                const caseItem = e.target.closest('.case-item');
                if (caseItem) {
                    const caseId = parseInt(caseItem.dataset.id);
                    togglePinCase(caseId);
                }
            });
        }

        // 渲染武器箱列表
        function renderCaseList() {
            const sortedCases = [...state.filteredCases].sort((a, b) => {
                const aPinned = state.pinnedCases.includes(a.id);
                const bPinned = state.pinnedCases.includes(b.id);
                
                if (aPinned && !bPinned) return -1;
                if (!aPinned && bPinned) return 1;
                return 0;
            });

            elements.caseList.innerHTML = sortedCases.map(caseItem => `
                <div class="case-item ${state.selectedCase?.id === caseItem.id ? 'active' : ''} ${state.pinnedCases.includes(caseItem.id) ? 'pinned' : ''}" 
                     data-id="${caseItem.id}" onclick="selectCase(${JSON.stringify(caseItem).replace(/"/g, '&quot;')})">
                    ${state.pinnedCases.includes(caseItem.id) ? '<span class="pin-indicator">⭐ </span>' : ''}
                    ${caseItem.name}
                    <button class="pin-btn" onclick="event.stopPropagation(); pinCase(${caseItem.id})" title="点击置顶">📌</button>
                </div>
            `).join('');
        }

        // 渲染皮肤级别列表
        function renderLevelList() {
            if (!state.selectedCase) {
                elements.levelList.innerHTML = '<div class="no-data">请先选择武器箱</div>';
                return;
            }

            const levels = state.selectedCase.levels.sort((a, b) => 
                (levelOrder[a.name] || 99) - (levelOrder[b.name] || 99)
            );

            elements.levelList.innerHTML = levels.map(level => `
                <div class="level-item ${state.selectedLevel?.name === level.name ? 'active' : ''}" 
                     onclick="selectLevel(${JSON.stringify(level).replace(/"/g, '&quot;')})">
                    ${level.name}
                </div>
            `).join('');

            // 默认选择第一个级别
            if (levels.length > 0 && !state.selectedLevel) {
                selectLevel(levels[0]);
            }
        }

        // 渲染皮肤列表
        function renderSkinList() {
            if (!state.selectedLevel) {
                elements.skinList.innerHTML = '<div class="no-data">请先选择皮肤级别</div>';
                return;
            }

            elements.skinList.innerHTML = state.selectedLevel.skins.map(skin => `
                <div class="skin-card ${state.selectedSkin?.id === skin.id ? 'active' : ''}" 
                     onclick="selectSkin(${JSON.stringify(skin).replace(/"/g, '&quot;')})">
                    <div class="skin-image">🔫</div>
                    <div class="skin-name">${skin.name}</div>
                </div>
            `).join('');
        }

        // 选择武器箱
        function selectCase(caseItem) {
            state.selectedCase = caseItem;
            state.selectedLevel = null;
            state.selectedSkin = null;
            
            renderCaseList();
            renderLevelList();
            renderSkinList();
            updateWearRange();
            clearResults();
        }

        // 选择皮肤级别
        function selectLevel(level) {
            state.selectedLevel = level;
            state.selectedSkin = null;
            
            renderLevelList();
            renderSkinList();
            updateWearRange();
            clearResults();
        }

        // 选择皮肤
        function selectSkin(skin) {
            state.selectedSkin = skin;
            
            renderSkinList();
            updateWearRange();
            clearResults();
            
            // 自动设置磨损值为中间值
            const midWear = (skin.minWear + skin.maxWear) / 2;
            state.wearValue = midWear;
            elements.wearInput.value = midWear.toFixed(3);
        }

        // 更新磨损值范围显示
        function updateWearRange() {
            if (state.selectedSkin) {
                elements.wearRange.textContent = `磨损范围：${state.selectedSkin.minWear.toFixed(3)} ~ ${state.selectedSkin.maxWear.toFixed(3)}`;
                elements.wearRange.classList.remove('error');
            } else {
                elements.wearRange.textContent = '请先选择皮肤';
                elements.wearRange.classList.remove('error');
            }
        }

        // 处理搜索
        function handleSearch(e) {
            state.searchQuery = e.target.value.toLowerCase();
            
            if (!state.searchQuery) {
                state.filteredCases = state.cases;
            } else {
                state.filteredCases = state.cases.filter(c => 
                    c.name.toLowerCase().includes(state.searchQuery)
                );
            }
            
            renderCaseList();
        }

        // 处理磨损值输入
        function handleWearInput(e) {
            const value = parseFloat(e.target.value);
            
            if (!isNaN(value)) {
                state.wearValue = Math.max(0, Math.min(1, value));
                
                // 验证磨损值范围
                if (state.selectedSkin) {
                    const isValid = state.wearValue >= state.selectedSkin.minWear && 
                                   state.wearValue <= state.selectedSkin.maxWear;
                    
                    elements.wearInput.classList.toggle('error', !isValid);
                    elements.wearRange.classList.toggle('error', !isValid);
                    
                    if (!isValid) {
                        elements.wearRange.textContent = `磨损值应在 ${state.selectedSkin.minWear.toFixed(3)} ~ ${state.selectedSkin.maxWear.toFixed(3)} 之间`;
                    }
                }
            }
        }

        // 置顶/取消置顶武器箱
        function togglePinCase(caseId) {
            const index = state.pinnedCases.indexOf(caseId);
            
            if (index > -1) {
                state.pinnedCases.splice(index, 1);
            } else {
                state.pinnedCases.push(caseId);
            }
            
            localStorage.setItem('pinnedCases', JSON.stringify(state.pinnedCases));
            renderCaseList();
            
            alert(state.pinnedCases.includes(caseId) ? '已置顶' : '已取消置顶');
        }

        // 点击置顶功能
        function pinCase(caseId) {
            const index = state.pinnedCases.indexOf(caseId);
            
            // 如果已经置顶，则移动到最前面
            if (index > -1) {
                state.pinnedCases.splice(index, 1);
            }
            
            // 将武器箱添加到置顶列表的最前面
            state.pinnedCases.unshift(caseId);
            
            localStorage.setItem('pinnedCases', JSON.stringify(state.pinnedCases));
            renderCaseList();
            
            alert('已置顶');
        }

        // 计算下级皮肤
        function calculateResults() {
            if (!validateInput()) return;
            
            const currentOrder = levelOrder[state.selectedLevel.name];
            const nextOrder = currentOrder - 1;
            const nextLevel = state.selectedCase.levels.find(l => levelOrder[l.name] === nextOrder);
            
            if (!nextLevel) {
                showError('当前皮肤没有下级皮肤');
                return;
            }
            
            const results = nextLevel.skins.map(lowerSkin => {
                const lowerWear = calculateLowerWear(lowerSkin);
                const condition = getWearCondition(lowerWear);
                
                return {
                    name: lowerSkin.name,
                    wear: lowerWear,
                    wearFormatted: lowerWear.toFixed(3),
                    conditionCode: condition.code,
                    conditionText: condition.text
                };
            });
            
            results.sort((a, b) => a.wear - b.wear);
            displayResults(results);
        }

        // 计算下级皮肤磨损值
        function calculateLowerWear(lowerSkin) {
            const { selectedSkin, wearValue } = state;
            
            return lowerSkin.minWear +
                (lowerSkin.maxWear - lowerSkin.minWear) *
                (wearValue - selectedSkin.minWear) /
                (selectedSkin.maxWear - selectedSkin.minWear);
        }

        // 获取磨损状态
        function getWearCondition(wear) {
            if (wear >= 0.45) {
                return { code: 'battle-scarred', text: '战痕累累' };
            } else if (wear >= 0.38) {
                return { code: 'well-worn', text: '破损不堪' };
            } else if (wear >= 0.15) {
                return { code: 'field-tested', text: '久经沙场' };
            } else if (wear >= 0.07) {
                return { code: 'minimal-wear', text: '略有磨损' };
            } else {
                return { code: 'factory-new', text: '崭新出厂' };
            }
        }

        // 显示计算结果
        function displayResults(results) {
            elements.resultsContainer.innerHTML = results.map(result => `
                <div class="result-card">
                    <div class="result-skin-name">${result.name}</div>
                    <div class="result-wear">磨损值: ${result.wearFormatted}</div>
                    <div class="result-condition condition-${result.conditionCode}">${result.conditionText}</div>
                </div>
            `).join('');
        }

        // 验证输入
        function validateInput() {
            if (!state.selectedCase) {
                showError('请先选择武器箱');
                return false;
            }
            
            if (!state.selectedLevel) {
                showError('请选择皮肤级别');
                return false;
            }
            
            if (!state.selectedSkin) {
                showError('请选择一个皮肤');
                return false;
            }
            
            if (isNaN(state.wearValue)) {
                showError('请输入有效的磨损值');
                return false;
            }
            
            if (state.wearValue < state.selectedSkin.minWear || state.wearValue > state.selectedSkin.maxWear) {
                showError(`磨损值应在 ${state.selectedSkin.minWear.toFixed(3)} ~ ${state.selectedSkin.maxWear.toFixed(3)} 之间`);
                return false;
            }
            
            return true;
        }

        // 显示错误信息
        function showError(message) {
            elements.resultsContainer.innerHTML = `<div class="no-data" style="color: #f56565;">${message}</div>`;
        }

        // 清除结果
        function clearResults() {
            elements.resultsContainer.innerHTML = '<div class="no-data">请完成以上步骤后查看计算结果</div>';
        }

        // 启动应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
